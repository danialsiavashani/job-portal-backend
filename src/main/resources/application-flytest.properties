# ==============================================================================
# spring profile: flytest
#
# Purpose  : Validates that V1__init_schema.sql creates a complete schema and
#            that Hibernate ddl-auto=validate accepts it from scratch.
#
# Usage    :
#   ./mvnw.cmd test -Dspring.profiles.active=flytest ^
#                   -Dtest=JobsApplicationTests ^
#                   -DfailIfNoTests=false
#
# SAFETY   : Targets `jobsportal_flytest` only — never `jobsportal`.
#            createDatabaseIfNotExist=true auto-creates the DB on first connect.
#            To start completely fresh, drop jobsportal_flytest manually first:
#              mysql -u <user> -p -e "DROP DATABASE IF EXISTS jobsportal_flytest;"
#
# CREDENTIALS :
#   Not set here — inherited from application.properties (git-ignored).
#   To run without application.properties, pass credentials on the command line:
#     -Dspring.datasource.username=<user> -Dspring.datasource.password=<pass>
# ==============================================================================

# ── Datasource ───────────────────────────────────────────────────────────────
# Points at the isolated test database; never touches jobsportal.
spring.datasource.url=jdbc:mysql://localhost:3306/jobsportal_flytest?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# ── Flyway ───────────────────────────────────────────────────────────────────
# Run from zero — no baseline, no patch history.
# On a fresh DB: creates flyway_schema_history and applies V1 cleanly.
# On a subsequent run against an existing flytest DB: V1 is already recorded,
# Flyway skips it, and validate-on-migrate confirms the checksum still matches.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# ── JPA ──────────────────────────────────────────────────────────────────────
# validate: Hibernate checks all entity field mappings against the V1 schema.
# No DDL is emitted. Any column/type mismatch surfaces as a startup failure.
spring.jpa.hibernate.ddl-auto=validate

# ── Bootstrap admin ──────────────────────────────────────────────────────────
# Disabled: this profile verifies schema only; DataInitializer must not seed data.
# Re-enable with a safe password if you need a seeded admin in jobsportal_flytest.
app.bootstrap.admin.enabled=false
